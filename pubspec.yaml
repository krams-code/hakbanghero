name: hakbanghero
description: "A gamified fitness tracker for running, walking and jogging."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0

  # UI & Animation
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  fl_chart: ^0.70.2

  # Local Storage
  shared_preferences: ^2.3.5

  # ── GPS / Location (NEW) ──────────────────────────────────────────────────
  geolocator: ^13.0.4          # GPS speed + position stream
  permission_handler: ^11.3.1  # Runtime permission requests

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/